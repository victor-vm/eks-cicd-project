name: Push NGINX Image to ECR

on:
  push:
    branches: [ "main" ]

permissions:
  id-token: write
  contents: read

jobs:
  push-to-ecr:
    runs-on: ubuntu-latest

    steps:
    - uses: actions/checkout@v3

    - name: Configure AWS credentials
      uses: aws-actions/configure-aws-credentials@v4
      with:
        role-to-assume: arn:aws:iam::222055803569:role/ecr-full-role
        aws-region: ap-south-1

    - name: Login to ECR
      uses: aws-actions/amazon-ecr-login@v2

    - name: Pull NGINX
      run: docker pull nginx:latest

    - name: Tag Image
      run: |
        docker tag nginx:latest 222055803569.dkr.ecr.ap-south-1.amazonaws.com/nginx-repo:latest

    - name: Push Image
      run: |
        docker push 222055803569.dkr.ecr.ap-south-1.amazonaws.com/nginx-repo:latest
